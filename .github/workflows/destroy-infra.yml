name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type destroy-jee-knowledge-graph to confirm Terraform destroy."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    name: Destroy write-path infrastructure
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.confirm_destroy == 'destroy-jee-knowledge-graph' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=jee-knowledge-graph/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-south-1' }}"

      - name: Terraform destroy
        run: |
          terraform -chdir=terraform destroy -auto-approve \
            -var="aws_region=${{ vars.AWS_REGION || 'ap-south-1' }}" \
            -var="environment=prod" \
            -var="deletion_protection_enabled=false" \
            -var="artifact_bucket_force_destroy=true" \
            -var="graph_table_name=${{ vars.GRAPH_TABLE_NAME || 'jee-knowledge-graph' }}" \
            -var="artifact_bucket_name=${GRAPH_ARTIFACT_BUCKET_NAME:-}"
        env:
          GRAPH_ARTIFACT_BUCKET_NAME: ${{ vars.GRAPH_ARTIFACT_BUCKET_NAME }}
